services:
  ocpp-gateway:
    build: .
    ports:
      - "9000:9000"
    environment:
      - PORT=9000
      - ROUTES_FILE=/app/routes.json
      - LOG_LEVEL=info
    volumes:
      # Provide your routing table (see routes.example.json).
      - ./routes.json:/app/routes.json:ro
    restart: unless-stopped
